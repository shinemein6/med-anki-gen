<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF N-up Master Pro</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .app-container { max-width: 1100px; width: 100%; display: grid; grid-template-columns: 400px 1fr; gap: 30px; }
        .control-panel { background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); height: fit-content; }
        .preview-panel { background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; }
        
        h1 { font-size: 20px; margin: 0 0 25px 0; color: #1e293b; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #64748b; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary); }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; font-size: 16px; transition: opacity 0.2s; }
        .btn-main:hover { opacity: 0.9; }

        #previewCanvas { background: white; border: 1px solid #e2e8f0; max-width: 100%; height: auto; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
        .preview-info { margin-top: 15px; color: #94a3b8; font-size: 13px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="control-panel">
        <h1>📑 PDF N-up 설정</h1>
        
        <div class="form-group">
            <label>PDF 파일 업로드</label>
            <input type="file" id="pdfInput" accept="application/pdf">
        </div>

        <div class="form-group">
            <label>출력 용지 규격</label>
            <select id="pageSize" onchange="updatePreview()">
                <option value="B4" selected>B4 (JIS - 257x364mm)</option>
                <option value="A4">A4 (ISO - 210x297mm)</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>가로 개수 (a)</label>
                <input type="number" id="cols" value="3" min="1" oninput="updatePreview()">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>세로 개수 (b)</label>
                <input type="number" id="rows" value="6" min="1" oninput="updatePreview()">
            </div>
        </div>

        <div class="form-group">
            <label>배치 순서</label>
            <select id="direction" onchange="updatePreview()">
                <option value="horizontal">가로 우선 (→ 방향)</option>
                <option value="vertical">세로 우선 (↓ 방향)</option>
            </select>
        </div>

        <button class="btn-main" onclick="generatePdf()">변환 및 다운로드</button>
    </div>

    <div class="preview-panel">
        <label style="align-self: flex-start; margin-bottom: 15px;">출력 레이아웃 미리보기</label>
        <canvas id="previewCanvas"></canvas>
        <div class="preview-info" id="previewInfo">용지 비율에 맞게 그리드가 생성됩니다.</div>
    </div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const SIZES = {
        'A4': { pt: [595.28, 841.89], label: 'A4' },
        'B4': { pt: [728.50, 1031.81], label: 'B4 (JIS)' }
    };

    let uploadedPdfData = null;
    let firstPageThumbnail = null;

    // 파일 업로드 처리
    document.getElementById('pdfInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const arrayBuffer = await file.arrayBuffer();
        uploadedPdfData = arrayBuffer;

        // PDF.js로 첫 페이지 렌더링하여 썸네일 생성
        const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        
        const viewport = page.getViewport({ scale: 0.5 });
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        
        await page.render({ canvasContext: ctx, viewport }).promise;
        firstPageThumbnail = canvas; // 캔버스 객체 자체를 썸네일로 보관
        
        updatePreview();
    });

    // 실시간 미리보기 업데이트
    function updatePreview() {
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const cols = parseInt(document.getElementById('cols').value) || 1;
        const rows = parseInt(document.getElementById('rows').value) || 1;
        const sizeKey = document.getElementById('pageSize').value;
        const direction = document.getElementById('direction').value;
        
        const [pW, pH] = SIZES[sizeKey].pt;

        // 캔버스 크기 결정 (화면 표시용)
        const displayScale = 0.6; 
        canvas.width = pW * displayScale;
        canvas.height = pH * displayScale;

        // 배경 그리기
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 그리드 계산
        const cellW = canvas.width / cols;
        const cellH = canvas.height / rows;

        ctx.strokeStyle = "#cbd5e1";
        ctx.lineWidth = 1;

        for (let i = 0; i < cols * rows; i++) {
            let r, c;
            if (direction === 'horizontal') {
                r = Math.floor(i / cols);
                c = i % cols;
            } else {
                c = Math.floor(i / rows);
                r = i % rows;
            }

            const x = c * cellW;
            const y = r * cellH;

            // 칸 테두리
            ctx.strokeRect(x, y, cellW, cellH);

            // 첫 번째 칸에 PDF 썸네일이 있다면 그리기 (비율 유지)
            if (i === 0 && firstPageThumbnail) {
                const tw = firstPageThumbnail.width;
                const th = firstPageThumbnail.height;
                const s = Math.min(cellW / tw, cellH / th) * 0.9; // 90% 크기로 쏙 넣기
                const dw = tw * s;
                const dh = th * s;
                const dx = x + (cellW - dw) / 2;
                const dy = y + (cellH - dh) / 2;
                ctx.drawImage(firstPageThumbnail, dx, dy, dw, dh);
            } else {
                // 번호 표시
                ctx.fillStyle = "#e2e8f0";
                ctx.font = "12px sans-serif";
                ctx.fillText(i + 1, x + 5, y + 15);
            }
        }
        document.getElementById('previewInfo').innerText = `${sizeKey} 용지 | ${cols}x${rows} 그리드 | ${direction === 'horizontal' ? '가로' : '세로'} 순서`;
    }

    // PDF 생성 및 다운로드
    async function generatePdf() {
        if (!uploadedPdfData) return alert("PDF 파일을 먼저 업로드해주세요.");

        try {
            const outDoc = await PDFLib.PDFDocument.create();
            const srcDoc = await PDFLib.PDFDocument.load(uploadedPdfData);
            const embeddedPages = await outDoc.embedPages(srcDoc.getPages());
            
            const cols = parseInt(document.getElementById('cols').value);
            const rows = parseInt(document.getElementById('rows').value);
            const sizeKey = document.getElementById('pageSize').value;
            const direction = document.getElementById('direction').value;
            const pageSize = SIZES[sizeKey].pt;
            const [pW, pH] = pageSize;

            const cellW = pW / cols;
            const cellH = pH / rows;
            const itemsPerPage = cols * rows;

            let currentPage;
            for (let i = 0; i < embeddedPages.length; i++) {
                if (i % itemsPerPage === 0) currentPage = outDoc.addPage(pageSize);

                const localIdx = i % itemsPerPage;
                let r, c;
                if (direction === 'horizontal') {
                    r = Math.floor(localIdx / cols);
                    c = localIdx % cols;
                } else {
                    c = Math.floor(localIdx / rows);
                    r = localIdx % rows;
                }

                const page = embeddedPages[i];
                const { width: ow, height: oh } = page;
                const scale = Math.min(cellW / ow, cellH / oh) * 0.98; // 여백 2%

                const dw = ow * scale;
                const dh = oh * scale;
                const dx = (c * cellW) + (cellW - dw) / 2;
                const dy = pH - ((r + 1) * cellH) + (cellH - dh) / 2;

                currentPage.drawPage(page, { x: dx, y: dy, width: dw, height: dh });
            }

            const bytes = await outDoc.save();
            const blob = new Blob([bytes], { type: "application/pdf" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "converted_layout.pdf";
            link.click();
        } catch (e) {
            alert("처리 중 오류가 발생했습니다: " + e.message);
        }
    }

    // 초기 실행
    updatePreview();
</script>

</body>
</html>

제공해 드린 프레젠테이션과 업데이트된 도구를 통해 성공적인 서비스를 구축하시길 바랍니다. 추가적인 세부 조정이 필요하시면 언제든 말씀해 주세요!
